<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- lesson start -->

    <!-- css universal selector styling added -->
    <h1>Practice with CSS!</h1>

    <!-- css type / element selector (selected divs) styling -->
    <div>Hello, World!</div>
    <div>Hello again!</div>
    <p>Hi...</p>
    <div>Okay, bye.</div>

    <!-- class selector (selected alert-text) styling -->
    <div class="alert-text">Please agree to our terms of service.</div>

    <!-- side note: many classes can be used per element -->
    <div class="alert-text special">Special super alert text here!</div>

    <!-- id selector (selected title) styling -->
    <div id="title">Super Awesome Title</div>

    <!-- group selector (both read & unread) styling added -->
    <div class="read">[read]</div>
    <div class="unread">[unread]</div>
</body>
</html>
